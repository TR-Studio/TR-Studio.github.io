<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holly Project — Medieval</title>
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --gold: #c9a84c;
      --dark-gold: #8a6a1e;
      --deep-gold: #f0c060;
      --stone: #3a2d1e;
      --dark-stone: #1e1610;
      --crimson: #8b1a1a;
      --dark-crimson: #5c0a0a;
      --parchment: #f2e4c4;
      --old-paper: #e0cc9a;
      --ink: #1e140a;
      --smoke: #9e8a6e;
      --ash: #c4b49a;
      --midnight: #0d0a06;
      --forest: #1a2d0e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: 'Crimson Text', Georgia, serif; overflow: hidden; background: var(--midnight); cursor: default; }

    /* Noise overlay */
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04; pointer-events: none; z-index: 9997;
    }

    /* ===== LOADING SCREEN ===== */
    #loadingScreen {
      position: fixed; inset: 0; z-index: 99999;
      background: var(--midnight);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif;
    }
    .ld-crest {
      border: 4px solid var(--gold); border-radius: 6px;
      padding: 40px 60px; text-align: center; position: relative;
      box-shadow: 0 0 0 8px var(--stone), 0 0 0 12px var(--gold), 0 0 80px rgba(201,168,76,0.3);
      background: var(--dark-stone);
    }
    .ld-crest::before {
      content: '⚔  HOLLY PROJECT  ⚔'; position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
      background: var(--gold); color: var(--ink); padding: 2px 20px;
      font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 4px; white-space: nowrap;
    }
    .ld-shield { font-size: 5rem; margin-bottom: 16px; filter: drop-shadow(0 0 20px rgba(201,168,76,0.5)); animation: shimmer 2s ease-in-out infinite; }
    @keyframes shimmer { 0%,100%{filter:drop-shadow(0 0 10px rgba(201,168,76,0.4))} 50%{filter:drop-shadow(0 0 30px rgba(201,168,76,0.9))} }
    .ld-title { color: var(--gold); font-family: 'Cinzel', serif; font-size: 2.4rem; letter-spacing: 4px; text-shadow: 0 0 20px rgba(201,168,76,0.6); margin-bottom: 4px; }
    .ld-sub { color: var(--ash); font-size: 0.75rem; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 30px; }
    .ld-bar-wrap { width: 260px; height: 8px; background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3); border-radius: 4px; margin-bottom: 10px; overflow: hidden; }
    .ld-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--dark-gold), var(--gold)); border-radius: 4px; transition: width 0.1s linear; box-shadow: 0 0 10px var(--gold); }
    .ld-pct { color: var(--gold); font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 6px; }
    .ld-log { color: var(--smoke); font-size: 0.65rem; letter-spacing: 2px; min-height: 16px; text-transform: uppercase; }
    #loadingScreen.fade-out { animation: ldFade 0.7s ease-out forwards; }
    @keyframes ldFade { to { opacity: 0; pointer-events: none; } }

    /* ===== HOMEPAGE ===== */
    .homepage {
      width: 100%; height: 100%; position: relative; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .homepage::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, #05030a 0%, #0d0a14 30%, #1a1025 60%, #0d0a06 80%, #1a1410 100%);
      z-index: 0;
    }
    .stars-field { position: absolute; inset: 0; z-index: 1; }
    .star-dot { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
    @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:1} }

    /* Castle silhouette */
    .castle { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 2; width: 100%; max-width: 900px; opacity: 0.85; }
    .castle svg { width: 100%; }

    /* Moon */
    .moon { position: absolute; top: 60px; right: 120px; z-index: 2; width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff8e0, #e8d5a3 60%, #c4a060); box-shadow: 0 0 40px rgba(232,213,163,0.7), 0 0 80px rgba(201,168,76,0.3); }

    /* Torches */
    .torch { position: absolute; bottom: 160px; z-index: 4; display: flex; flex-direction: column; align-items: center; }
    .torch-left { left: 80px; }
    .torch-right { right: 80px; }
    .torch-flame { width: 18px; height: 28px; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; background: radial-gradient(ellipse at 50% 80%, #ff8c00, #ffcc00 50%, transparent); animation: flicker 0.8s ease-in-out infinite alternate; }
    @keyframes flicker { 0%{transform:scaleX(1) scaleY(1);opacity:0.9} 100%{transform:scaleX(1.2) scaleY(0.9);opacity:1} }
    .torch-body { width: 8px; height: 50px; background: linear-gradient(to bottom, #5a3010, #3a1a05); border-radius: 2px; }
    .torch-glow { position: absolute; top: 0; width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, rgba(255,140,0,0.35) 0%, transparent 70%); transform: translateX(-21px) translateY(-16px); animation: flickerGlow 0.8s ease-in-out infinite alternate; }
    @keyframes flickerGlow { 0%{opacity:0.7} 100%{opacity:1} }

    .hp-content { position: relative; z-index: 5; display: flex; flex-direction: column; align-items: center; text-align: center; }
    .logo-badge { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--gold); box-shadow: 0 0 0 8px var(--stone), 0 0 0 10px var(--gold), 0 0 60px rgba(201,168,76,0.5); overflow: hidden; animation: badgePulse 4s ease-in-out infinite; margin-bottom: 28px; }
    .logo-badge img { width: 100%; height: 100%; object-fit: cover; }
    @keyframes badgePulse { 0%,100%{box-shadow:0 0 0 8px var(--stone),0 0 0 10px var(--gold),0 0 40px rgba(201,168,76,0.5)} 50%{box-shadow:0 0 0 8px var(--stone),0 0 0 10px var(--gold),0 0 80px rgba(201,168,76,0.8)} }

    .hp-title { font-family: 'Cinzel', serif; font-weight: 700; font-size: 4rem; color: var(--gold); text-shadow: 3px 3px 0 var(--dark-stone), 0 0 40px rgba(201,168,76,0.8); letter-spacing: 6px; animation: slideDown 0.8s ease-out; margin-bottom: 8px; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-40px)} to{opacity:1;transform:translateY(0)} }
    .hp-divider { display: flex; align-items: center; gap: 12px; margin: 10px 0 18px; animation: fadeUp 0.8s ease-out 0.2s both; }
    .hp-divider-line { width: 80px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold)); }
    .hp-divider-line.r { background: linear-gradient(90deg, var(--gold), transparent); }
    .hp-divider-star { color: var(--gold); font-size: 1.2rem; }
    .hp-subtitle { font-family: 'Cinzel', serif; color: var(--ash); font-size: 0.95rem; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 32px; animation: fadeUp 0.8s ease-out 0.3s both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

    .hp-nav { display: flex; flex-direction: column; gap: 10px; align-items: center; animation: fadeUp 0.8s ease-out 0.4s both; }
    .hp-nav-row { display: flex; gap: 10px; }
    .nav-btn {
      font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 2px;
      padding: 11px 22px; background: linear-gradient(135deg, var(--stone), var(--dark-stone));
      color: var(--gold); border: 2px solid var(--gold); border-radius: 3px;
      cursor: pointer; transition: all 0.2s; box-shadow: 3px 3px 0 var(--dark-crimson);
    }
    .nav-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--dark-crimson); background: linear-gradient(135deg, var(--dark-gold), var(--stone)); }
    .nav-btn.discord {
      background: linear-gradient(135deg, #3d4896, #2d3a7a); border-color: #6b7bd4; color: #c8d0ff;
      box-shadow: 3px 3px 0 #1a1f50; text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .nav-btn.discord:hover { box-shadow: 4px 4px 0 #1a1f50; }

    /* ===== INNER PAGE ===== */
    .page-view {
      width: 100%; height: 100%;
      background: linear-gradient(160deg, #0d0a06 0%, #1e1610 40%, #0d0a06 100%);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .page-view::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        repeating-linear-gradient(90deg,transparent,transparent 100px,rgba(201,168,76,0.02) 100px,rgba(201,168,76,0.02) 102px),
        repeating-linear-gradient(0deg,transparent,transparent 100px,rgba(201,168,76,0.02) 100px,rgba(201,168,76,0.02) 102px);
      pointer-events: none; z-index: 0;
    }
    /* Corner decorations */
    .page-view::after {
      content: ''; position: absolute; inset: 20px;
      border: 1px solid rgba(201,168,76,0.12);
      pointer-events: none; z-index: 0;
    }

    .parchment {
      position: relative; z-index: 2;
      width: 92%; max-width: 780px; max-height: 90%;
      background: linear-gradient(160deg, #f5e6c8 0%, #e8d5a3 50%, #dcc88a 100%);
      border: 3px solid var(--stone); border-radius: 4px; padding: 36px 40px;
      box-shadow: 0 0 0 6px rgba(58,45,30,0.4), 0 0 0 9px rgba(201,168,76,0.2), inset 0 0 40px rgba(58,45,30,0.1), 0 20px 60px rgba(0,0,0,0.9);
      animation: unscroll 0.45s ease-out; overflow-y: auto;
    }
    @keyframes unscroll { from{opacity:0;transform:scaleY(0.92) translateY(16px)} to{opacity:1;transform:scaleY(1) translateY(0)} }
    .parchment::-webkit-scrollbar { width: 7px; }
    .parchment::-webkit-scrollbar-thumb { background: var(--stone); border-radius: 4px; }

    /* Parchment corner flourishes */
    .parchment::before {
      content: '✦'; position: absolute; top: 12px; left: 14px;
      color: rgba(58,45,30,0.3); font-size: 1rem;
    }
    .parchment::after {
      content: '✦'; position: absolute; top: 12px; right: 14px;
      color: rgba(58,45,30,0.3); font-size: 1rem;
    }

    .pg-header { text-align: center; border-bottom: 2px solid var(--stone); padding-bottom: 16px; margin-bottom: 24px; }
    .pg-tag { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 5px; color: var(--stone); text-transform: uppercase; margin-bottom: 6px; opacity: 0.7; }
    .pg-title { font-family: 'Cinzel', serif; font-size: 1.8rem; color: var(--ink); display: flex; align-items: center; gap: 10px; justify-content: center; text-shadow: 1px 1px 0 rgba(58,45,30,0.3); }
    .pg-desc { font-family: 'Crimson Text', serif; font-size: 1rem; color: var(--stone); font-style: italic; margin-top: 6px; line-height: 1.6; }

    .section { margin-bottom: 20px; }
    .section label { display: block; font-family: 'Cinzel', serif; color: var(--stone); font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; border-bottom: 1px dashed rgba(58,45,30,0.4); padding-bottom: 4px; margin-bottom: 8px; }
    .section .box { width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.45); border: 1px solid rgba(58,45,30,0.3); border-radius: 2px; color: var(--ink); font-family: 'Crimson Text', serif; font-size: 1rem; line-height: 1.7; white-space: pre-wrap; word-wrap: break-word; }

    .divider { display: flex; align-items: center; gap: 8px; margin: 18px 0; color: var(--stone); font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 3px; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--stone)); }
    .divider::after { background:linear-gradient(90deg,var(--stone),transparent); }

    .btn-row { display: flex; gap: 12px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
    .btn { font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 2px; padding: 11px 26px; border-radius: 3px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; border: 2px solid; }
    .btn-primary { background: linear-gradient(135deg, var(--stone), var(--dark-stone)); color: var(--gold); border-color: var(--gold); box-shadow: 3px 3px 0 var(--dark-crimson); }
    .btn-primary:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--dark-crimson); }
    .btn-ghost { background: transparent; color: var(--stone); border-color: var(--stone); box-shadow: 3px 3px 0 rgba(58,45,30,0.2); }
    .btn-ghost:hover { background: rgba(58,45,30,0.1); transform: translate(-1px,-1px); }

    /* ===== PDF SLIDESHOW ===== */
    .pdf-viewer { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 14px; }
    /* A4 portrait container: ratio 1:√2 ≈ 1:1.414 */
    .pdf-canvas-wrap {
      width: 100%; max-width: 480px;
      aspect-ratio: 1 / 1.414;
      border: 3px solid var(--stone);
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 6px 6px 0 rgba(58,45,30,0.5), 0 12px 40px rgba(0,0,0,0.5);
      background: #f5f0e8;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    #pdfCanvas { display: block; }
    .pdf-controls { display: flex; align-items: center; gap: 16px; }
    .pdf-btn {
      background: linear-gradient(135deg, var(--stone), var(--dark-stone));
      color: var(--gold); border: 2px solid var(--gold);
      padding: 8px 20px; border-radius: 3px;
      font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 1px;
      cursor: pointer; transition: all 0.2s;
    }
    .pdf-btn:hover { transform: translate(-1px,-1px); box-shadow: 2px 2px 0 var(--dark-crimson); }
    .pdf-btn:disabled { opacity: 0.35; cursor: default; transform: none; box-shadow: none; }
    .pdf-page-info { font-family: 'Cinzel', serif; font-size: 0.8rem; color: var(--stone); min-width: 80px; text-align: center; letter-spacing: 2px; }
    .pdf-loading { color: var(--stone); font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 3px; text-align: center; }
    .pdf-spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid rgba(58,45,30,0.2); border-top-color: var(--stone); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== YOUTUBE ===== */
    .yt-list { display: flex; flex-direction: column; gap: 10px; margin: 8px 0; }
    .yt-item { display: flex; align-items: center; gap: 12px; background: rgba(58,45,30,0.07); border: 2px solid rgba(58,45,30,0.3); border-radius: 4px; overflow: hidden; cursor: pointer; transition: all 0.25s; padding: 10px; }
    .yt-item:hover { border-color: var(--gold); background: rgba(58,45,30,0.14); transform: translateX(4px); box-shadow: 3px 3px 0 rgba(58,45,30,0.2); }
    .yt-item.active { border-color: var(--gold); box-shadow: 0 0 14px rgba(201,168,76,0.4); background: rgba(201,168,76,0.08); }
    .yt-item-num { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold); min-width: 24px; text-align: center; flex-shrink: 0; }
    .yt-item-thumb { position: relative; width: 120px; flex-shrink: 0; border-radius: 3px; overflow: hidden; border: 1px solid rgba(58,45,30,0.3); }
    .yt-item-thumb img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
    .yt-item-play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); color: rgba(201,168,76,0.9); font-size: 1.3rem; opacity: 0; transition: opacity 0.2s; }
    .yt-item:hover .yt-item-play { opacity: 1; }
    .yt-item-info { flex: 1; }
    .yt-item-title { font-family: 'Cinzel', serif; font-size: 0.82rem; color: var(--ink); line-height: 1.4; letter-spacing: 0.5px; }
    .yt-item-hint { font-family: 'Crimson Text', serif; font-size: 0.75rem; color: var(--smoke); font-style: italic; margin-top: 5px; }

    .yt-player-wrap { width: 100%; aspect-ratio: 16/9; border: 3px solid var(--stone); border-radius: 3px; overflow: hidden; box-shadow: 4px 4px 0 var(--dark-stone); background: #000; margin-bottom: 12px; display: none; }
    .yt-player-wrap > div { width: 100%; height: 100%; }
    .yt-now-label { font-family: 'Cinzel', serif; font-size: 0.72rem; color: var(--stone); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; display: none; }

    /* ===== RULES PAGE ===== */
    .rule-block { display: flex; flex-direction: column; gap: 10px; margin-bottom: 6px; }
    .rule-card { display: flex; gap: 14px; align-items: flex-start; padding: 14px 16px; background: rgba(255,255,255,0.38); border: 1px solid rgba(58,45,30,0.3); border-left: 4px solid var(--stone); border-radius: 0 4px 4px 0; transition: background 0.2s; }
    .rule-card:hover { background: rgba(255,255,255,0.55); }
    .rule-card-icon { font-size: 1.5rem; flex-shrink: 0; margin-top: 2px; }
    .rule-card-title { font-family: 'Cinzel', serif; font-size: 0.85rem; color: var(--stone); margin-bottom: 6px; letter-spacing: 0.5px; }
    .rule-card-desc { font-family: 'Crimson Text', serif; font-size: 1rem; color: var(--ink); line-height: 1.7; }

    .rule-special { border: 2px solid var(--gold); border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
    .rule-special-header { display: flex; align-items: flex-start; gap: 14px; padding: 16px; background: linear-gradient(135deg, rgba(58,45,30,0.15), rgba(201,168,76,0.1)); border-bottom: 1px solid rgba(58,45,30,0.25); }
    .rule-special-icon { font-size: 2rem; flex-shrink: 0; }
    .rule-special-title { font-family: 'Cinzel', serif; font-size: 1rem; color: var(--stone); margin-bottom: 4px; }
    .rule-special-sub { font-family: 'Crimson Text', serif; font-size: 0.97rem; color: var(--ink); line-height: 1.6; font-style: italic; }
    .rule-special-body { padding: 16px; display: flex; flex-direction: column; gap: 0; }
    .rule-choice { padding: 12px 14px; background: rgba(255,255,255,0.35); border-radius: 3px; }
    .rule-choice-label { font-family: 'Cinzel', serif; font-size: 0.82rem; color: var(--stone); margin-bottom: 10px; }
    .rule-choice-items { display: flex; flex-direction: column; gap: 4px; }
    .rule-choice-item { font-family: 'Crimson Text', serif; font-size: 1rem; color: var(--ink); display: flex; align-items: center; gap: 8px; padding: 3px 0; }
    .rule-choice-divider { text-align: center; font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 4px; color: var(--smoke); padding: 10px 0; }
    .rule-special-note { padding: 12px 16px; background: rgba(201,168,76,0.12); border-top: 1px dashed rgba(58,45,30,0.3); font-family: 'Crimson Text', serif; font-size: 1rem; color: var(--ink); line-height: 1.6; }
    .rule-special-note strong { color: var(--stone); }

    /* Rank table */
    .rank-table { width: 100%; border-collapse: collapse; margin: 10px 0; }
    .rank-table th { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); background: var(--stone); padding: 8px 12px; text-align: left; border: 1px solid rgba(58,45,30,0.5); }
    .rank-table td { font-family: 'Crimson Text', serif; font-size: 0.97rem; color: var(--ink); padding: 9px 12px; border: 1px solid rgba(58,45,30,0.2); vertical-align: top; line-height: 1.5; }
    .rank-table tr:nth-child(even) td { background: rgba(255,255,255,0.3); }
    .rank-table tr:nth-child(odd) td { background: rgba(255,255,255,0.15); }
    .rank-badge { display: inline-block; font-family: 'Cinzel', serif; font-size: 0.72rem; padding: 2px 10px; border-radius: 20px; border: 1px solid; }
    .rank-king { background: rgba(201,168,76,0.2); border-color: var(--gold); color: #7a5a10; }
    .rank-duke { background: rgba(120,80,30,0.15); border-color: #8a6030; color: #5a3010; }
    .rank-lord { background: rgba(80,60,40,0.15); border-color: #6a5030; color: #4a3020; }
    .rank-knight { background: rgba(60,50,40,0.15); border-color: #5a4535; color: #3a2520; }
    .rank-squire { background: rgba(40,35,30,0.1); border-color: #4a3a30; color: #2a1a10; }

    .lore-quote { font-family: 'Crimson Text', serif; font-size: 1.05rem; font-style: italic; color: var(--stone); line-height: 1.8; padding: 14px 18px; background: rgba(58,45,30,0.07); border-left: 3px solid var(--gold); border-radius: 0 3px 3px 0; margin-bottom: 16px; }
    .lore-note { font-family: 'Crimson Text', serif; font-size: 0.95rem; color: var(--ink); line-height: 1.7; padding: 12px 16px; background: rgba(201,168,76,0.12); border: 1px dashed rgba(58,45,30,0.35); border-radius: 3px; margin-top: 4px; }
    .lore-note strong { color: var(--stone); }

    @media (max-width: 768px) {
      .hp-title { font-size: 2.6rem; }
      .logo-badge { width: 130px; height: 130px; }

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  /* Stars */

    const sf = document.getElementById('starsField');

      const s = document.createElement('div');
      s.className = 'star-dot';

      sf.appendChild(s);
    }
  })();

  /* =============================================
     วิดีโอยุคกลาง
  ============================================== */
  const videos = [
    { id: 'qeCPqZ1PR3E', title: 'ข้อมูลลำดับยศขุนนาง' },
    { id: '9V3wgYEyPMw', title: 'ตำนานอัศวินโต๊ะกลม' },
    { id: 'Fu7-YYr-6U0', title: 'อาวุธอัศวิน' },
  ];

  /* =============================================
     PDF State
  ============================================== */
  let pdfDoc = null, pdfPage = 1, pdfTotal = 0, pdfRendering = false;

  async function loadPDF() {
    const wrap = document.getElementById('pdfCanvasWrap');
    const info = document.getElementById('pdfPageInfo');
    if (info) info.textContent = 'กำลังโหลด...';
    try {
      pdfDoc = await pdfjsLib.getDocument('HP.pdf').promise;
      pdfTotal = pdfDoc.numPages;
      pdfPage = 1;
      await renderPDFPage(pdfPage);
    } catch(e) {
      if (wrap) wrap.innerHTML = `<div class="pdf-loading">⚠️ ไม่พบไฟล์ HP.pdf<br><span style="font-size:0.8rem;opacity:0.7;font-family:Crimson Text,serif;">กรุณาวางไฟล์ HP.pdf ในโฟลเดอร์เดียวกัน</span></div>`;
    }
  }

  async function renderPDFPage(num) {
    if (!pdfDoc || pdfRendering) return;
    pdfRendering = true;
    const page = await pdfDoc.getPage(num);
    const canvas = document.getElementById('pdfCanvas');
    const wrap = document.getElementById('pdfCanvasWrap');
    const dpr = window.devicePixelRatio || 1;
    const scale = Math.min(wrap.clientWidth / page.getViewport({scale:1}).width, 2.5) * dpr;
    const vp = page.getViewport({ scale });
    canvas.width = vp.width;
    canvas.height = vp.height;
    canvas.style.width = (vp.width / dpr) + 'px';
    canvas.style.height = (vp.height / dpr) + 'px';
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    pdfRendering = false;
    document.getElementById('pdfPageInfo').textContent = `หน้า ${num} / ${pdfTotal}`;
    document.getElementById('pdfPrev').disabled = num <= 1;
    document.getElementById('pdfNext').disabled = num >= pdfTotal;
  }

  window.pdfPrev = function() { if (pdfPage > 1) { pdfPage--; renderPDFPage(pdfPage); } };
  window.pdfNext = function() { if (pdfPage < pdfTotal) { pdfPage++; renderPDFPage(pdfPage); } };

  /* =============================================
     PAGE RENDER FUNCTIONS
  ============================================== */

  function renderPdfPage() {
    return `
      <div class="pdf-viewer">
        <div class="pdf-canvas-wrap" id="pdfCanvasWrap">
          <canvas id="pdfCanvas"></canvas>
        </div>
        <div class="pdf-controls">
          <button class="pdf-btn" id="pdfPrev" onclick="pdfPrev()" disabled>◀ ก่อนหน้า</button>
          <span class="pdf-page-info" id="pdfPageInfo">กำลังโหลด...</span>
          <button class="pdf-btn" id="pdfNext" onclick="pdfNext()" disabled>ถัดไป ▶</button>
        </div>
        <div style="text-align:center;margin-top:6px;">
          <a href="HP.pdf" target="_blank" class="pdf-btn" style="display:inline-flex;align-items:center;gap:8px;text-decoration:none;">
            📄 เปิด PDF แบบเต็มหน้าจอ
          </a>
        </div>
        <div class="pdf-note">📖 สไลด์ข้อมูล — ใช้ปุ่มด้านบนเพื่อเลื่อนหน้า</div>
      </div>
    `;
  }

  function renderVideos() {
    let html = `

    `;
    videos.forEach((v, i) => {
      html += `
        <div class="yt-item" id="yt-${i}" onclick="playVideo('${v.id}','${v.title}',${i})">

            <div class="yt-item-hint">คลิกเพื่อรับชม</div>
          </div>
        </div>
      `;
    });
    html += `</div>`;
    return html;
  }

      <div class="divider">⚔ บทลงโทษ ⚔</div>

      <div class="rule-special">

        </div>

  /* =============================================
     PAGE NAVIGATION
  ============================================== */
  const pageOrder = ['pdfPage', 'videos', 'rules'];

  const pageMeta = {
    pdfPage: { tag: '1 / 3  ⚔  Holly Project', title: '📜 สไลด์ข้อมูล', desc: 'ม้วนหนังสือแห่งอาณาจักร — บันทึกความรู้อันศักดิ์สิทธิ์' },
    videos:  { tag: '2 / 3  ⚔  Holly Project', title: '🎬 คลังวิดีโอยุคกลาง', desc: 'ชมวิดีโอแนะนำเกี่ยวกับโลกยุคกลางและอัศวิน — คลิกเพื่อรับชม' },
    rules:   { tag: '3 / 3  ⚔  Holly Project', title: '⚖️ กฎการสตรีมและถ่ายวิดีโอ', desc: 'บัญญัติแห่งอาณาจักรที่ขุนนางทุกท่านต้องยึดถือ' },
  };

  const pageFns = { pdfPage: renderPdfPage, videos: renderVideos, rules: renderRules };

  let currentPageIdx = -1;

  function showPage(key) {
    currentPageIdx = pageOrder.indexOf(key);
    renderCurrentPage();
    document.getElementById('homepage').style.display = 'none';
    document.getElementById('pageView').style.display = 'flex';
  }

  function goToPageIdx(idx) {
    if (idx < 0 || idx >= pageOrder.length) { goHome(); return; }
    currentPageIdx = idx;
    renderCurrentPage();
  }

  function renderCurrentPage() {
    const key = pageOrder[currentPageIdx];
    const pd = pageMeta[key];
    const isFirst = currentPageIdx === 0;
    const isLast  = currentPageIdx === pageOrder.length - 1;
    const prevLabel = isFirst ? '⌂ กลับหน้าหลัก' : '← ย้อนกลับ';
    const nextLabel = isLast  ? '⌂ กลับหน้าหลัก' : 'ถัดไป →';

    document.getElementById('pageContent').innerHTML = `
      <div class="pg-header">
        <div class="pg-tag">${pd.tag}</div>
        <div class="pg-title">${pd.title}</div>
        <div class="pg-desc">${pd.desc}</div>
      </div>
      ${pageFns[key]()}
      <div class="divider">⚔ ⚔ ⚔</div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="goToPageIdx(${currentPageIdx - 1})">${prevLabel}</button>
        <button class="btn btn-primary" onclick="goToPageIdx(${currentPageIdx + 1})">${nextLabel}</button>
      </div>
    `;
    document.getElementById('pageContent').scrollTop = 0;

    // Load PDF after DOM is ready
    if (key === 'pdfPage') {
      setTimeout(loadPDF, 100);
    }
  }

  function goHome() {
    document.getElementById('pageView').style.display = 'none';
    document.getElementById('homepage').style.display = 'flex';
    pdfDoc = null; pdfPage = 1; pdfTotal = 0;
  }

  function playVideo(id, title, idx) {
    document.querySelectorAll('.yt-item').forEach(t => t.classList.remove('active'));
    const item = document.getElementById('yt-' + idx);
    if (item) item.classList.add('active');
    const wrap = document.getElementById('ytPlayerWrap');
    const label = document.getElementById('ytNowLabel');
    wrap.style.display = 'block';
    label.style.display = 'block';
    document.getElementById('ytNowTitle').textContent = title;
    wrap.innerHTML = `
      <div style="position:relative;width:100%;height:100%;cursor:pointer;" onclick="window.open('https://www.youtube.com/watch?v=${id}','_blank')">
        <img src="https://img.youtube.com/vi/${id}/maxresdefault.jpg" onerror="this.src='https://img.youtube.com/vi/${id}/hqdefault.jpg'" style="width:100%;height:100%;display:block;object-fit:cover;" alt="${title}">
        <div style="position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;">
          <div style="width:60px;height:60px;background:rgba(201,168,76,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;">▶</div>
          <div style="color:#f5e6c8;font-family:'Cinzel',serif;font-size:0.85rem;letter-spacing:2px;text-shadow:1px 1px 4px #000;">${title}</div>
          <div style="color:rgba(201,168,76,0.8);font-family:'Crimson Text',serif;font-size:0.85rem;font-style:italic;">คลิกเพื่อเปิดใน YouTube</div>
        </div>
      </div>`;
    wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  /* =============================================
     LOADING
  ============================================== */
  const ldLogs = [
    'OPENING THE CASTLE GATES...',
    'LIGHTING THE TORCHES...',
    'SUMMONING THE KNIGHTS...',
    'UNROLLING THE PARCHMENT...',
    'POLISHING THE ARMOR...',
    'SHARPENING THE SWORDS...',
    'RAISING THE DRAWBRIDGE...',
    'LIGHTING THE GREAT HALL...',
    'HOLLY PROJECT — THE REALM AWAITS'
  ];
  let ldProgress = 0, ldStep = 0;
  const ldBar = document.getElementById('ldBar'), ldPct = document.getElementById('ldPct'), ldLog = document.getElementById('ldLog');
  function ldTick() {
    if (ldProgress >= 100) {
      ldLog.textContent = ldLogs[ldLogs.length-1]; ldPct.textContent = '100%'; ldBar.style.width = '100%';
      setTimeout(() => {
        document.getElementById('loadingScreen').classList.add('fade-out');
        setTimeout(() => document.getElementById('loadingScreen').remove(), 700);
      }, 500);
      return;
    }
    ldProgress = Math.min(100, ldProgress + Math.random() * 4 + 1);
    ldBar.style.width = ldProgress + '%'; ldPct.textContent = Math.floor(ldProgress) + '%';
    const li = Math.floor((ldProgress/100)*(ldLogs.length-1));
    if (li !== ldStep) { ldStep = li; ldLog.textContent = ldLogs[ldStep]; }
    setTimeout(ldTick, 65);
  }
  ldTick();
</script>
</body>
</html>
