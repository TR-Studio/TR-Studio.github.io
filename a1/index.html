<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holly Grave</title>
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --sand: #d4a853;
      --dark-sand: #b8892e;
      --leather: #8b4513;
      --dark-leather: #5c2d0a;
      --blood: #8b1a1a;
      --dark-blood: #5c0a0a;
      --parchment: #f5e6c8;
      --old-paper: #e8d5a3;
      --ink: #2c1810;
      --smoke: #9e8a6e;
      --ash: #c4b49a;
      --midnight: #1a0f08;
      --dusk: #2d1b0e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: 'Crimson Text', Georgia, serif; overflow: hidden; background: var(--midnight); cursor: crosshair; }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04; pointer-events: none; z-index: 9997;
    }

    /* ===== LOADING ===== */
    #loadingScreen {
      position: fixed; inset: 0; z-index: 99999;
      background: var(--midnight);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: 'Special Elite', monospace;
    }
    .ld-wanted {
      border: 4px solid var(--sand); border-radius: 4px;
      padding: 40px 60px; text-align: center; position: relative;
      box-shadow: 0 0 0 8px var(--dark-leather), 0 0 0 12px var(--sand), 0 0 60px rgba(212,168,83,0.3);
      background: var(--dusk);
    }
    .ld-wanted::before {
      content: '★  WANTED  ★'; position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
      background: var(--sand); color: var(--ink); padding: 2px 20px;
      font-family: 'Rye', serif; font-size: 1rem; letter-spacing: 4px; white-space: nowrap;
    }
    .ld-logo-wrap { width: 120px; height: 120px; border: 3px solid var(--sand); border-radius: 50%; margin: 0 auto 20px; overflow: hidden; box-shadow: 0 0 30px rgba(212,168,83,0.5); }
    .ld-logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .ld-title { color: var(--sand); font-family: 'Rye', serif; font-size: 2.4rem; letter-spacing: 4px; text-shadow: 0 0 20px rgba(212,168,83,0.6), 2px 2px 0 var(--dark-leather); margin-bottom: 4px; }
    .ld-sub { color: var(--ash); font-size: 0.75rem; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 30px; }
    .ld-bar-wrap { width: 260px; height: 8px; background: rgba(212,168,83,0.15); border: 1px solid rgba(212,168,83,0.3); border-radius: 4px; margin-bottom: 10px; overflow: hidden; }
    .ld-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--dark-leather), var(--sand)); border-radius: 4px; transition: width 0.1s linear; box-shadow: 0 0 10px var(--sand); }
    .ld-pct { color: var(--sand); font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 6px; }
    .ld-log { color: var(--smoke); font-size: 0.65rem; letter-spacing: 2px; min-height: 16px; text-transform: uppercase; }
    #loadingScreen.fade-out { animation: ldFade 0.7s ease-out forwards; }
    @keyframes ldFade { to { opacity: 0; pointer-events: none; } }

    /* ===== HOMEPAGE ===== */
    .homepage {
      width: 100%; height: 100%; position: relative; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .homepage::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, #0d0805 0%, #1a100a 30%, #2d1b0e 60%, #4a2810 80%, #6b3a15 100%);
      z-index: 0;
    }
    .stars-field { position: absolute; inset: 0; z-index: 1; }
    .star-dot { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
    @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:1} }
    .moon { position: absolute; top: 60px; right: 120px; z-index: 2; width: 70px; height: 70px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff8e0, #e8d5a3 60%, #c4a060); box-shadow: 0 0 30px rgba(232,213,163,0.6), 0 0 60px rgba(212,168,83,0.3); }
    .mountains { position: absolute; bottom: 0; left: 0; right: 0; z-index: 2; height: 200px; }
    .mountains svg { width: 100%; height: 100%; }
    .cactus-left { position: absolute; bottom: 80px; left: 60px; z-index: 3; }
    .cactus-right { position: absolute; bottom: 80px; right: 60px; z-index: 3; transform: scaleX(-1); }

    .hp-content { position: relative; z-index: 5; display: flex; flex-direction: column; align-items: center; text-align: center; }
    .logo-badge { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--sand); box-shadow: 0 0 0 8px var(--dark-leather), 0 0 0 10px var(--sand), 0 0 50px rgba(212,168,83,0.5); overflow: hidden; animation: badgePulse 4s ease-in-out infinite; margin-bottom: 28px; }
    .logo-badge img { width: 100%; height: 100%; object-fit: cover; }
    @keyframes badgePulse { 0%,100%{box-shadow:0 0 0 8px var(--dark-leather),0 0 0 10px var(--sand),0 0 40px rgba(212,168,83,0.5)} 50%{box-shadow:0 0 0 8px var(--dark-leather),0 0 0 10px var(--sand),0 0 70px rgba(212,168,83,0.8)} }
    .hp-title { font-family: 'Rye', serif; font-size: 4rem; color: var(--sand); text-shadow: 3px 3px 0 var(--dark-leather), 0 0 30px rgba(212,168,83,0.7); letter-spacing: 6px; animation: slideDown 0.8s ease-out; margin-bottom: 8px; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-40px)} to{opacity:1;transform:translateY(0)} }
    .hp-divider { display: flex; align-items: center; gap: 12px; margin: 10px 0 18px; animation: fadeUp 0.8s ease-out 0.2s both; }
    .hp-divider-line { width: 80px; height: 2px; background: linear-gradient(90deg, transparent, var(--sand)); }
    .hp-divider-line.r { background: linear-gradient(90deg, var(--sand), transparent); }
    .hp-divider-star { color: var(--sand); font-size: 1.2rem; }
    .hp-subtitle { font-family: 'Special Elite', serif; color: var(--ash); font-size: 0.95rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 32px; animation: fadeUp 0.8s ease-out 0.3s both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

    .hp-nav { display: flex; flex-direction: column; gap: 10px; align-items: center; animation: fadeUp 0.8s ease-out 0.4s both; }
    .hp-nav-row { display: flex; gap: 10px; }
    .nav-btn {
      font-family: 'Rye', serif; font-size: 0.8rem; letter-spacing: 2px;
      padding: 11px 22px; background: linear-gradient(135deg, var(--leather), var(--dark-leather));
      color: var(--sand); border: 2px solid var(--sand); border-radius: 3px;
      cursor: crosshair; transition: all 0.2s; box-shadow: 3px 3px 0 var(--dark-blood);
    }
    .nav-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--dark-blood); background: linear-gradient(135deg, var(--dark-sand), var(--leather)); }
    .nav-btn.discord {
      background: linear-gradient(135deg, #3d4896, #2d3a7a); border-color: #6b7bd4; color: #c8d0ff;
      box-shadow: 3px 3px 0 #1a1f50; text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .nav-btn.discord:hover { box-shadow: 4px 4px 0 #1a1f50; }

    #musicBtn { position: fixed; bottom: 20px; right: 20px; z-index: 9999; width: 46px; height: 46px; border-radius: 50%; border: 2px solid var(--sand); background: rgba(45,27,14,0.9); backdrop-filter: blur(8px); color: var(--sand); font-size: 1.2rem; cursor: crosshair; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(212,168,83,0.3); transition: all 0.3s; }
    #musicBtn:hover { box-shadow: 0 0 25px rgba(212,168,83,0.6); transform: scale(1.1); }

    /* ===== INNER PAGE ===== */
    .page-view {
      width: 100%; height: 100%;
      background: linear-gradient(160deg, #1a0f08 0%, #2d1b0e 40%, #1a0f08 100%);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .page-view::before {
      content: ''; position: absolute; inset: 0;
      background-image: repeating-linear-gradient(90deg,transparent,transparent 80px,rgba(212,168,83,0.03) 80px,rgba(212,168,83,0.03) 82px), repeating-linear-gradient(180deg,transparent,transparent 20px,rgba(0,0,0,0.05) 20px,rgba(0,0,0,0.05) 21px);
      pointer-events: none; z-index: 0;
    }

    .parchment {
      position: relative; z-index: 2;
      width: 90%; max-width: 720px; max-height: 88%;
      background: linear-gradient(160deg, #f5e6c8 0%, #e8d5a3 50%, #dcc88a 100%);
      border: 3px solid var(--leather); border-radius: 4px; padding: 36px 40px;
      box-shadow: 0 0 0 6px rgba(139,69,19,0.3), 0 0 0 8px rgba(212,168,83,0.2), inset 0 0 40px rgba(139,69,19,0.08), 0 20px 60px rgba(0,0,0,0.8);
      animation: unscroll 0.45s ease-out; overflow-y: auto;
    }
    @keyframes unscroll { from{opacity:0;transform:scaleY(0.92) translateY(16px)} to{opacity:1;transform:scaleY(1) translateY(0)} }
    .parchment::-webkit-scrollbar { width: 7px; }
    .parchment::-webkit-scrollbar-thumb { background: var(--leather); border-radius: 4px; }

    .pg-header { text-align: center; border-bottom: 2px solid var(--leather); padding-bottom: 16px; margin-bottom: 24px; }
    .pg-tag { font-family: 'Special Elite', serif; font-size: 0.6rem; letter-spacing: 5px; color: var(--leather); text-transform: uppercase; margin-bottom: 6px; }
    .pg-title { font-family: 'Rye', serif; font-size: 1.8rem; color: var(--ink); display: flex; align-items: center; gap: 10px; justify-content: center; text-shadow: 1px 1px 0 rgba(139,69,19,0.3); }
    .pg-desc { font-family: 'Crimson Text', serif; font-size: 1rem; color: var(--leather); font-style: italic; margin-top: 6px; line-height: 1.6; }

    .section { margin-bottom: 20px; }
    .section label { display: block; font-family: 'Special Elite', serif; color: var(--leather); font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; border-bottom: 1px dashed rgba(139,69,19,0.4); padding-bottom: 4px; margin-bottom: 8px; }
    .section .box { width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.45); border: 1px solid rgba(139,69,19,0.3); border-radius: 2px; color: var(--ink); font-family: 'Crimson Text', serif; font-size: 1rem; line-height: 1.7; white-space: pre-wrap; word-wrap: break-word; }
    .section .box.tall { min-height: 100px; }

    .divider { display: flex; align-items: center; gap: 8px; margin: 18px 0; color: var(--leather); font-family: 'Special Elite', serif; font-size: 0.7rem; letter-spacing: 3px; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--leather)); }
    .divider::after { background:linear-gradient(90deg,var(--leather),transparent); }

    .btn-row { display: flex; gap: 12px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
    .btn { font-family: 'Rye', serif; font-size: 0.8rem; letter-spacing: 2px; padding: 11px 26px; border-radius: 3px; cursor: crosshair; transition: all 0.2s; text-transform: uppercase; border: 2px solid; }
    .btn-primary { background: linear-gradient(135deg, var(--leather), var(--dark-leather)); color: var(--sand); border-color: var(--sand); box-shadow: 3px 3px 0 var(--dark-blood); }
    .btn-primary:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--dark-blood); }
    .btn-ghost { background: transparent; color: var(--leather); border-color: var(--leather); box-shadow: 3px 3px 0 rgba(139,69,19,0.2); }
    .btn-ghost:hover { background: rgba(139,69,19,0.1); transform: translate(-1px,-1px); }

    /* ===== YOUTUBE ===== */
    .yt-player-wrap { width: 100%; aspect-ratio: 16/9; border: 3px solid var(--leather); border-radius: 3px; overflow: hidden; box-shadow: 4px 4px 0 var(--dark-leather); background: #000; margin-bottom: 12px; display: none; }
    .yt-player-wrap iframe { width: 100%; height: 100%; border: none; }
    .yt-now-label { font-family: 'Special Elite', serif; font-size: 0.72rem; color: var(--leather); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; display: none; }

    .yt-list { display: flex; flex-direction: column; gap: 10px; margin: 8px 0; }
    .yt-item { display: flex; align-items: center; gap: 12px; background: rgba(139,69,19,0.07); border: 2px solid rgba(139,69,19,0.3); border-radius: 4px; overflow: hidden; cursor: crosshair; transition: all 0.25s; padding: 10px; }
    .yt-item:hover { border-color: var(--sand); background: rgba(139,69,19,0.14); transform: translateX(4px); box-shadow: 3px 3px 0 rgba(139,69,19,0.2); }
    .yt-item.active { border-color: var(--sand); box-shadow: 0 0 14px rgba(212,168,83,0.4); background: rgba(212,168,83,0.08); }
    .yt-item-num { font-family: 'Rye', serif; font-size: 1.1rem; color: var(--sand); min-width: 24px; text-align: center; flex-shrink: 0; }
    .yt-item-thumb { position: relative; width: 120px; flex-shrink: 0; border-radius: 3px; overflow: hidden; border: 1px solid rgba(139,69,19,0.3); }
    .yt-item-thumb img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
    .yt-item-play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); color: rgba(212,168,83,0.9); font-size: 1.3rem; opacity: 0; transition: opacity 0.2s; }
    .yt-item:hover .yt-item-play { opacity: 1; }
    .yt-item-info { flex: 1; }
    .yt-item-title { font-family: 'Rye', serif; font-size: 0.85rem; color: var(--ink); line-height: 1.4; letter-spacing: 0.5px; }
    .yt-item-hint { font-family: 'Special Elite', serif; font-size: 0.6rem; letter-spacing: 2px; color: var(--smoke); text-transform: uppercase; margin-top: 5px; }

    .yt-empty { padding: 30px 20px; text-align: center; background: rgba(139,69,19,0.06); border: 2px dashed rgba(139,69,19,0.3); border-radius: 3px; }
    .yt-empty-icon { font-size: 2rem; margin-bottom: 8px; }
    .yt-empty-text { font-family: 'Special Elite', serif; font-size: 0.75rem; color: var(--smoke); letter-spacing: 2px; text-transform: uppercase; }

    /* ===== APPLY ===== */
    .req-list { list-style: none; }
    .req-list li { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px dashed rgba(139,69,19,0.3); font-size: 1rem; color: var(--ink); line-height: 1.6; }
    .req-list li:last-child { border-bottom: none; }
    .req-bullet { color: var(--leather); font-size: 1rem; flex-shrink: 0; }

    .step-list { list-style: none; }
    .step-list li { display: flex; align-items: flex-start; gap: 14px; padding: 12px 0; border-bottom: 1px dashed rgba(139,69,19,0.25); font-size: 1rem; color: var(--ink); line-height: 1.6; }
    .step-list li:last-child { border-bottom: none; }
    .step-num { font-family: 'Rye', serif; font-size: 1.1rem; color: var(--leather); flex-shrink: 0; min-width: 26px; }

    .discord-cta { text-align: center; margin-top: 16px; padding: 18px; background: rgba(61,72,150,0.08); border: 2px solid rgba(107,123,212,0.3); border-radius: 3px; }
    .discord-cta p { font-size: 1rem; color: var(--ink); margin-bottom: 14px; line-height: 1.6; font-style: italic; }
    .btn-discord-link { display: inline-flex; align-items: center; gap: 10px; font-family: 'Special Elite', serif; font-size: 0.85rem; letter-spacing: 2px; padding: 12px 28px; background: linear-gradient(135deg, #3d4896, #2d3a7a); color: #c8d0ff; border: 2px solid #6b7bd4; border-radius: 3px; text-decoration: none; transition: all 0.2s; box-shadow: 3px 3px 0 #1a1f50; cursor: crosshair; }
    .btn-discord-link:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #1a1f50; }

    /* ===== RULES ===== */
    .rule-item { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px dashed rgba(139,69,19,0.25); }
    .rule-item:last-child { border-bottom: none; }
    .rule-num { font-family: 'Rye', serif; font-size: 1rem; color: var(--blood); flex-shrink: 0; min-width: 26px; }
    .rule-text { font-size: 1rem; color: var(--ink); line-height: 1.6; }
    .penalty-row { display: flex; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px dashed rgba(139,69,19,0.25); }
    .penalty-row:last-child { border-bottom: none; }
    .penalty-badge { font-family: 'Rye', serif; font-size: 0.78rem; color: var(--sand); background: linear-gradient(135deg, var(--blood), var(--dark-blood)); border: 1px solid rgba(212,168,83,0.4); border-radius: 20px; padding: 2px 14px; flex-shrink: 0; }
    .penalty-text { font-size: 1rem; color: var(--ink); line-height: 1.5; }

    .pg-pager { font-family: 'Special Elite', serif; font-size: 0.65rem; letter-spacing: 4px; color: var(--smoke); text-transform: uppercase; margin-top: 8px; }

    /* ===== RULE STYLES ===== */
    .rule-block { display: flex; flex-direction: column; gap: 10px; margin-bottom: 6px; }
    .rule-card { display: flex; gap: 14px; align-items: flex-start; padding: 14px 16px; background: rgba(255,255,255,0.38); border: 1px solid rgba(139,69,19,0.3); border-left: 4px solid var(--leather); border-radius: 0 4px 4px 0; transition: background 0.2s; }
    .rule-card:hover { background: rgba(255,255,255,0.55); }
    .rule-card-icon { font-size: 1.5rem; flex-shrink: 0; margin-top: 2px; }
    .rule-card-title { font-family: 'Rye', serif; font-size: 0.9rem; color: var(--leather); margin-bottom: 6px; letter-spacing: 0.5px; }
    .rule-card-desc { font-family: 'Crimson Text', serif; font-size: 1rem; color: var(--ink); line-height: 1.7; }

    .rule-special { border: 2px solid var(--sand); border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
    .rule-special-header { display: flex; align-items: flex-start; gap: 14px; padding: 16px; background: linear-gradient(135deg, rgba(139,69,19,0.15), rgba(212,168,83,0.1)); border-bottom: 1px solid rgba(139,69,19,0.25); }
    .rule-special-icon { font-size: 2rem; flex-shrink: 0; }
    .rule-special-title { font-family: 'Rye', serif; font-size: 1rem; color: var(--leather); margin-bottom: 4px; }
    .rule-special-sub { font-family: 'Crimson Text', serif; font-size: 0.97rem; color: var(--ink); line-height: 1.6; font-style: italic; }
    .rule-special-body { padding: 16px; display: flex; flex-direction: column; gap: 0; }
    .rule-choice { padding: 12px 14px; background: rgba(255,255,255,0.35); border-radius: 3px; }
    .rule-choice-label { font-family: 'Rye', serif; font-size: 0.85rem; color: var(--leather); margin-bottom: 10px; }
    .rule-choice-items { display: flex; flex-direction: column; gap: 4px; }
    .rule-choice-item { font-family: 'Crimson Text', serif; font-size: 1rem; color: var(--ink); display: flex; align-items: center; gap: 8px; padding: 3px 0; }
    .rule-choice-divider { text-align: center; font-family: 'Special Elite', serif; font-size: 0.7rem; letter-spacing: 4px; color: var(--smoke); padding: 10px 0; }
    .rule-special-note { padding: 12px 16px; background: rgba(212,168,83,0.12); border-top: 1px dashed rgba(139,69,19,0.3); font-family: 'Crimson Text', serif; font-size: 1rem; color: var(--ink); line-height: 1.6; }
    .rule-special-note strong { color: var(--leather); }

    /* ===== LORE STYLES ===== */
    .lore-welcome { margin-bottom: 6px; }
    .lore-quote { font-family: 'Crimson Text', serif; font-size: 1.05rem; font-style: italic; color: var(--leather); line-height: 1.8; padding: 14px 18px; background: rgba(139,69,19,0.07); border-left: 3px solid var(--sand); border-radius: 0 3px 3px 0; }

    .lore-faction { margin-bottom: 14px; padding: 14px 16px; background: rgba(255,255,255,0.35); border: 1px solid rgba(139,69,19,0.25); border-radius: 3px; }
    .lore-faction-title { font-family: 'Rye', serif; font-size: 0.95rem; color: var(--leather); margin-bottom: 8px; letter-spacing: 1px; }
    .lore-faction-body { font-family: 'Crimson Text', serif; font-size: 1rem; color: var(--ink); line-height: 1.75; }
    .lore-faction-body strong { color: var(--leather); }

    .lore-role-row { display: flex; gap: 12px; margin-bottom: 6px; flex-wrap: wrap; }
    .lore-role { flex: 1; min-width: 200px; padding: 14px; background: rgba(255,255,255,0.4); border: 1px solid rgba(139,69,19,0.3); border-radius: 3px; text-align: center; }
    .lore-role-icon { font-size: 1.6rem; margin-bottom: 6px; }
    .lore-role-name { font-family: 'Rye', serif; font-size: 0.85rem; color: var(--leather); margin-bottom: 6px; }
    .lore-role-desc { font-family: 'Crimson Text', serif; font-size: 0.95rem; color: var(--ink); line-height: 1.6; }

    .lore-tribe { margin-bottom: 16px; border: 2px solid rgba(139,69,19,0.3); border-radius: 4px; overflow: hidden; }
    .lore-tribe.hawk { border-color: rgba(139,100,19,0.5); }
    .lore-tribe.iron { border-color: rgba(100,80,60,0.5); }
    .lore-tribe-header { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: rgba(139,69,19,0.12); border-bottom: 1px solid rgba(139,69,19,0.2); }

          </div>

        <div class="rule-special-body">
          <div class="rule-choice">
            <div class="rule-choice-label">🎬 ตัวเลือกที่ 1 — ทำวิดีโอ</div>
            <div class="rule-choice-items">
              <div class="rule-choice-item"><span class="req-bullet">✦</span>คลิปสั้น</div>
              <div class="rule-choice-item"><span class="req-bullet">✦</span>คลิปสตอรี่</div>
              <div class="rule-choice-item"><span class="req-bullet">✦</span>คลิปไฮไลท์</div>
              <div class="rule-choice-item"><span class="req-bullet">✦</span>คลิปสอนเล่น</div>
              <div class="rule-choice-item"><span class="req-bullet">✦</span>อื่นๆ ตามความเหมาะสม</div>
            </div>

          <div class="rule-choice-divider">— หรือ —</div>

          <div class="rule-choice">

              <div class="rule-choice-item"><span class="req-bullet">✦</span>ไลฟ์สดขณะเล่นปกติ</div>

            </div>

        <div class="rule-special-note">
          ⭐ ผู้เล่นสามารถเลือกทำ <strong>อย่างใดอย่างหนึ่ง</strong> หรือ <strong>ทั้งสองอย่าง</strong> ก็ได้ตามความสะดวก
        </div>

      <div class="lore-note" style="margin-top:16px;">
        ⚠️ <strong>หมายเหตุ:</strong> การไม่ปฏิบัติตามกติกาเสริมอาจส่งผลต่อสถานะของผู้เล่นใน Server โปรดติดต่อ Admin หากมีข้อสงสัย
      </div>

  }

  /* ---- หน้าวิดีโอ ---- */
  function renderVideos() {
    let html = `
      <div class="yt-player-wrap" id="ytPlayerWrap">
        <iframe id="ytFrame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
      </div>
      <div class="yt-now-label" id="ytNowLabel">▶ กำลังเล่น: <span id="ytNowTitle"></span></div>
    `;
    if (videos.length === 0) {
      html += `
        <div class="yt-empty">
          <div class="yt-empty-icon">🎬</div>
          <div class="yt-empty-text">กำลังรอลิ้งค์วิดีโอ — โปรดแจ้ง Admin</div>
        </div>
      `;
    } else {
      html += `<div class="yt-list">`;
      videos.forEach((v, i) => {
        html += `
          <div class="yt-item" id="yt-${i}" onclick="playVideo('${v.id}','${v.title}',${i})">
            <div class="yt-item-num">${i + 1}</div>
            <div class="yt-item-thumb">
              <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="${v.title}" onerror="this.style.background='#2d1b0e'">
              <div class="yt-item-play">▶</div>
            </div>
            <div class="yt-item-info">
              <div class="yt-item-title">${v.title}</div>
              <div class="yt-item-hint">คลิกเพื่อเล่น</div>
            </div>
          </div>
        `;
      });
      html += `</div>`;
    }
    return html;
  }

  /* ---- หน้าสมัคร ---- */
  function renderApply() {
    return `
      <div class="section">
        <label>ข้อกำหนดเบื้องต้น</label>
        <ul class="req-list">
          <li><span class="req-bullet">✦</span>อายุ 12 ปีขึ้นไป</li>
          <li><span class="req-bullet">✦</span>มีไมโครโฟน</li>
          <li><span class="req-bullet">✦</span>เข้าใจระบบ RP พื้นฐาน</li>
          <li><span class="req-bullet">✦</span>สามารถออนไลน์ได้อย่างน้อย 4 วัน/สัปดาห์</li>
        </ul>
      </div>
      <div class="divider">✦ ขั้นตอน ✦</div>
      <div class="section">
        <label>ขั้นตอนสมัคร</label>
        <ol class="step-list">
          <li><span class="step-num">1</span>ติดตามประกาศรับสมัครในดิสคอร์ด</li>
          <li><span class="step-num">2</span>รอได้รับสัมภาษณ์จาก Admin</li>
          <li><span class="step-num">3</span>ผ่านการสัมภาษณ์</li>
          <li><span class="step-num">4</span>รับ Whitelist (จ่ายค่าเซิร์ฟ) และเริ่มเล่นได้<br><span style="font-size:0.9rem;color:var(--leather);font-style:italic;">* กรณีฟรีค่าเข้า รอแอดมินแอดพอยให้</span></li>
        </ol>
      </div>
      <div class="discord-cta">
        <p>พร้อมแล้ว? เข้าร่วม Discord ของเราเพื่อเริ่มสมัคร<br>และติดตามประกาศรับสมัครได้เลย!</p>
        <a href="https://discord.gg/gGEEhwPxGz" target="_blank" class="btn-discord-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#c8d0ff"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.001.022.012.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
          เข้าร่วม Discord
        </a>
      </div>
    `;
  }

  const pages = {
    intro:  { tag: '1 / 4  ✦  Holly Grave', title: '📖 ข้อมูลเซิร์ฟเวอร์',       desc: 'ยินดีต้อนรับสู่ดินแดน Holly Grave', fn: renderIntro },
    videos: { tag: '2 / 4  ✦  Holly Grave', title: '🎬 วิดีโอแนะนำ',              desc: 'ชมวิดีโอแนะนำจากเซิร์ฟเวอร์ — คลิกเพื่อเล่น', fn: renderVideos },
    rules:  { tag: '3 / 4  ✦  Holly Grave', title: '📜 กติกาที่ควรทำ',             desc: 'กฎกติกาที่ผู้เล่นทุกคนต้องปฏิบัติตามอย่างเคร่งครัด', fn: renderRules },
    apply:  { tag: '4 / 4  ✦  Holly Grave', title: '🤠 ข้อกำหนดในการสมัคร',       desc: 'ขั้นตอนและข้อกำหนดการสมัครเข้าร่วม Holly Grave', fn: renderApply },
  };

  const pageOrder = ['intro', 'videos', 'rules', 'apply'];

  let currentPageIdx = -1;

  function showPage(key) {
    currentPageIdx = pageOrder.indexOf(key);
    renderCurrentPage();
    document.getElementById('homepage').style.display = 'none';
    document.getElementById('pageView').style.display = 'flex';
    if (music.paused && !isMuted) music.play();
  }

  function goToPageIdx(idx) {
    if (idx < 0) {
      goHome();
      return;
    }
    if (idx >= pageOrder.length) {
      goHome();
      return;
    }
    currentPageIdx = idx;
    renderCurrentPage();
  }

  function renderCurrentPage() {
    const key = pageOrder[currentPageIdx];
    const pd = pages[key];
    const isFirst = currentPageIdx === 0;
    const isLast  = currentPageIdx === pageOrder.length - 1;

    const prevLabel = isFirst ? '⌂ กลับหน้าหลัก' : '← ย้อนกลับ';
    const nextLabel = isLast  ? '⌂ กลับหน้าหลัก' : 'ถัดไป →';

    document.getElementById('pageContent').innerHTML = `
      <div class="pg-header">
        <div class="pg-tag">${pd.tag}</div>
        <div class="pg-title">${pd.title}</div>
        <div class="pg-desc">${pd.desc}</div>
      </div>
      ${pd.fn()}
      <div class="divider">✦ ✦ ✦</div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="goToPageIdx(${currentPageIdx - 1})">${prevLabel}</button>
        <button class="btn btn-primary" onclick="goToPageIdx(${currentPageIdx + 1})">${nextLabel}</button>
      </div>
    `;
    document.getElementById('pageContent').scrollTop = 0;
  }

  function goHome() {
    document.getElementById('pageView').style.display = 'none';
    document.getElementById('homepage').style.display = 'flex';
  }

  function playVideo(id, title, idx) {
    document.querySelectorAll('.yt-item').forEach(t => t.classList.remove('active'));
    const item = document.getElementById('yt-' + idx);
    if (item) item.classList.add('active');
    const wrap = document.getElementById('ytPlayerWrap');
    const label = document.getElementById('ytNowLabel');
    wrap.style.display = 'block';
    label.style.display = 'block';
    document.getElementById('ytNowTitle').textContent = title;
    wrap.innerHTML = `
      <div style="position:relative;width:100%;cursor:pointer;border-radius:6px;overflow:hidden;border:2px solid var(--leather);" onclick="window.open('https://www.youtube.com/watch?v=${id}','_blank')">
        <img src="https://img.youtube.com/vi/${id}/maxresdefault.jpg" onerror="this.src='https://img.youtube.com/vi/${id}/hqdefault.jpg'" style="width:100%;height:100%;display:block;object-fit:cover;" alt="${title}">
        <div style="position:absolute;inset:0;background:rgba(0,0,0,0.35);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;">
          <div style="width:56px;height:56px;background:rgba(212,168,83,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;">▶</div>
          <div style="color:#fff;font-family:'Rye',serif;font-size:0.85rem;letter-spacing:2px;text-shadow:1px 1px 4px #000;">${title}</div>
        </div>
      </div>`;
    wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  /* Loading */
  const ldLogs = ['RIDING INTO TOWN...','SADDLING UP...','LOADING GEAR...','CHECKING AMMO...','POLISHING SPURS...','TYING UP THE HORSE...','ENTERING THE SALOON...','POURING WHISKEY...','HOLLY GRAVE — OPEN FOR BUSINESS'];
  let ldProgress = 0, ldStep = 0;
  const ldBar = document.getElementById('ldBar'), ldPct = document.getElementById('ldPct'), ldLog = document.getElementById('ldLog');
  function ldTick() {
    if (ldProgress >= 100) {
      ldLog.textContent = ldLogs[ldLogs.length-1]; ldPct.textContent = '100%'; ldBar.style.width = '100%';
      setTimeout(() => { document.getElementById('loadingScreen').classList.add('fade-out'); setTimeout(() => document.getElementById('loadingScreen').remove(), 700); }, 500);
      return;
    }
    ldProgress = Math.min(100, ldProgress + Math.random() * 4 + 1);
    ldBar.style.width = ldProgress + '%'; ldPct.textContent = Math.floor(ldProgress) + '%';
    const li = Math.floor((ldProgress/100)*(ldLogs.length-1));
    if (li !== ldStep) { ldStep = li; ldLog.textContent = ldLogs[ldStep]; }
    setTimeout(ldTick, 65);
  }
  ldTick();

  /* Music */
  const music = document.getElementById('bgMusic');
  let isMuted = false;
  function toggleMusic() {
    isMuted = !isMuted; music.muted = isMuted;
    document.getElementById('musicBtn').textContent = isMuted ? '🔇' : '🎵';
    document.getElementById('musicBtn').style.opacity = isMuted ? '0.5' : '1';
  }
  music.volume = 0.5;
  // เพลงจะเล่นเมื่อกดปุ่ม "ข้อมูล" เท่านั้น

  function startInfo() {
    isMuted = false;
    music.muted = false;
    document.getElementById('musicBtn').textContent = '🎵';
    document.getElementById('musicBtn').style.opacity = '1';
    music.play().catch(() => {});
    showPage('intro');
  }
</script>
