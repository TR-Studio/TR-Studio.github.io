<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตารางกิจกรรม 7 วัน</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap');

  :root {
    --mon: #FF6B6B;
    --tue: #FF9F43;
    --wed: #FFEAA7;
    --thu: #55EFC4;
    --fri: #74B9FF;
    --sat: #A29BFE;
    --sun: #FD79A8;
    --bg: #F8F9FF;
    --card: #ffffff;
    --text: #2d3436;
    --muted: #636e72;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Prompt', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px 12px 60px;
  }

  /* ── COLOR PICKER PANEL ── */
  .color-panel {
    background: white;
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .color-panel h3 { font-size: .75rem; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; width: 100%; }
  .color-swatch { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .color-swatch label { font-size: .65rem; color: var(--muted); }
  .color-swatch input[type=color] {
    width: 34px; height: 34px; border: none; border-radius: 50%;
    cursor: pointer; padding: 2px; background: none;
  }
  .bg-pick { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .bg-pick label { font-size: .72rem; color: var(--muted); }
  .bg-pick input[type=color] { width: 32px; height: 32px; border: none; border-radius: 8px; cursor: pointer; }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 12px;
  }
  .btn-save {
    display: flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg,#6c5ce7,#a29bfe);
    color: white; border: none; border-radius: 30px;
    padding: 10px 22px; font-family: 'Prompt', sans-serif;
    font-size: .85rem; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 14px rgba(108,92,231,.35);
    transition: transform .15s, box-shadow .15s;
  }
  .btn-save:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(108,92,231,.45); }
  .btn-save svg { width:18px; height:18px; }

  /* ── CAPTURE ZONE ── */
  #capture {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 20px 12px 24px;
  }

  /* ── TITLE ── */
  .title-wrap {
    text-align: center;
    margin-bottom: 20px;
  }
  #page-title {
    font-size: clamp(1.3rem, 5vw, 1.9rem);
    font-weight: 700;
    color: var(--text);
    border: none;
    border-bottom: 3px dashed #dfe6e9;
    background: transparent;
    text-align: center;
    width: 100%;
    max-width: 500px;
    outline: none;
    padding: 6px 12px;
    font-family: 'Prompt', sans-serif;
    transition: border-color .2s;
  }
  #page-title:focus { border-bottom-color: #6c5ce7; }
  .title-hint { font-size: .72rem; color: #b2bec3; margin-top: 4px; }

  /* ── DESKTOP TABLE (hidden on mobile) ── */
  .table-wrap {
    overflow-x: auto;
    display: none;
  }
  @media (min-width: 700px) {
    .table-wrap { display: block; }
    .mobile-days { display: none !important; }
  }
  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 8px;
    min-width: 700px;
  }
  thead th {
    padding: 10px 8px 12px;
    font-size: .82rem;
    font-weight: 700;
    letter-spacing: .03em;
    border-radius: 10px;
    text-align: center;
    color: white;
    white-space: nowrap;
  }
  .th-mon { background: var(--mon); }
  .th-tue { background: var(--tue); }
  .th-wed { background: var(--wed); color: #555 !important; }
  .th-thu { background: var(--thu); color: #333 !important; }
  .th-fri { background: var(--fri); }
  .th-sat { background: var(--sat); }
  .th-sun { background: var(--sun); }
  .th-day-name { font-size: 1.05rem; display: block; }
  .th-day-en { font-size: .65rem; opacity: .8; font-weight: 400; }

  /* ── CELL ── */
  td {
    vertical-align: top;
    padding: 6px;
    width: calc(100% / 7);
  }
  .cell-inner {
    background: var(--card);
    border-radius: 12px;
    padding: 8px;
    min-height: 160px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* ── MOBILE DAYS ── */
  .mobile-days {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .mobile-day {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 2px 10px rgba(0,0,0,.07);
  }
  .mobile-day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    transition: opacity .15s;
  }
  .mobile-day-header:active { opacity: .8; }
  .mobile-day-title {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mobile-day-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .mobile-day-name {
    font-size: 1rem;
    font-weight: 700;
  }
  .mobile-day-en {
    font-size: .7rem;
    opacity: .6;
    font-weight: 400;
  }
  .mobile-day-count {
    font-size: .72rem;
    background: rgba(0,0,0,.07);
    border-radius: 20px;
    padding: 2px 8px;
    color: var(--muted);
  }
  .mobile-day-arrow {
    font-size: .9rem;
    color: var(--muted);
    transition: transform .2s;
  }
  .mobile-day.open .mobile-day-arrow { transform: rotate(180deg); }
  .mobile-day-body {
    display: none;
    flex-direction: column;
    gap: 6px;
    padding: 0 12px 12px;
  }
  .mobile-day.open .mobile-day-body { display: flex; }

  /* ── ACTIVITY CARD ── */
  .activity {
    border-radius: 8px;
    padding: 7px 30px 7px 10px;
    font-size: .78rem;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .activity .time-badge {
    font-size: .67rem;
    font-weight: 700;
    opacity: .85;
  }
  .activity .act-name {
    font-weight: 600;
    word-break: break-word;
    line-height: 1.35;
  }
  .activity .act-note {
    font-size: .67rem;
    opacity: .75;
    word-break: break-word;
  }
  .act-delete {
    position: absolute; top: 5px; right: 6px;
    background: rgba(0,0,0,.08); border: none; cursor: pointer;
    font-size: .65rem; opacity: .6; line-height:1;
    padding: 2px 4px; border-radius: 4px;
    transition: opacity .15s, background .15s;
  }
  .act-delete:hover { opacity: 1; background: rgba(200,0,0,.15); }

  /* ── ADD BUTTON ── */
  .btn-add {
    background: #f0f0f8;
    border: 2px dashed #dde;
    border-radius: 8px;
    padding: 8px;
    font-family: 'Prompt', sans-serif;
    font-size: .75rem;
    color: #999;
    cursor: pointer;
    width: 100%;
    transition: background .15s, color .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .btn-add:hover { background: #e8e8ff; color: #6c5ce7; border-color: #a29bfe; }

  /* ── ADD WITH TIME BUTTON ── */
  .btn-add-time {
    background: #fff8f0;
    border: 2px dashed #ffd0a0;
    border-radius: 8px;
    padding: 7px;
    font-family: 'Prompt', sans-serif;
    font-size: .72rem;
    color: #c47c2a;
    cursor: pointer;
    width: 100%;
    transition: background .15s, color .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .btn-add-time:hover { background: #fff0dc; color: #e07b1a; border-color: #f0a050; }

  /* ── QUICK TIME CHIPS ── */
  .quick-time-label { font-size: .74rem; color: var(--muted); margin-bottom: 4px; margin-top: 14px; display: block; }
  .quick-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 2px;
  }
  .chip {
    background: #f0f0ff;
    border: 1.5px solid #d4d4f7;
    border-radius: 20px;
    padding: 4px 12px;
    font-family: 'Prompt', sans-serif;
    font-size: .72rem;
    color: #6c5ce7;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    white-space: nowrap;
  }
  .chip:hover { background: #e0e0ff; border-color: #a29bfe; }

  /* ── MODAL ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(45,52,54,.55);
    backdrop-filter: blur(3px);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  @media (min-width: 600px) {
    .overlay { align-items: center; }
  }
  .overlay.show { display: flex; }
  .modal {
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 32px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 -8px 40px rgba(0,0,0,.18);
    animation: slideUp .25s ease;
    max-height: 92vh;
    overflow-y: auto;
  }
  @media (min-width: 600px) {
    .modal {
      border-radius: 20px;
      padding: 28px 28px 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,.18);
      animation: pop .2s ease;
    }
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  @keyframes pop {
    from { transform: scale(.92); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .modal-drag { width: 40px; height: 4px; background: #ddd; border-radius: 4px; margin: 0 auto 18px; }
  @media (min-width: 600px) { .modal-drag { display: none; } }
  .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
  .modal label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal textarea {
    width: 100%; padding: 10px 12px;
    border: 1.5px solid #dfe6e9; border-radius: 10px;
    font-family: 'Prompt', sans-serif; font-size: .9rem;
    outline: none; transition: border-color .2s;
  }
  .modal input:focus, .modal textarea:focus { border-color: #6c5ce7; }
  .modal textarea { resize: vertical; min-height: 60px; }
  .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .color-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .color-dot {
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    border: 3px solid transparent; transition: transform .15s, border-color .15s;
  }
  .color-dot.active, .color-dot:hover { transform: scale(1.2); border-color: var(--text); }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .modal-btns button {
    flex: 1; padding: 12px; border: none; border-radius: 10px;
    font-family: 'Prompt', sans-serif; font-weight: 600; cursor: pointer; font-size: .88rem;
  }
  .btn-cancel { background: #f5f6fa; color: var(--muted); }
  .btn-confirm { background: #6c5ce7; color: white; }
  .btn-confirm:hover { background: #5a4bd1; }


  /* ── FLOATING ACTION BUTTON ── */
  .fab {
    position: fixed;
    bottom: 28px;
    right: 24px;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    color: white;
    border: none;
    font-size: 1.6rem;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(108,92,231,.45);
    z-index: 90;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .2s, box-shadow .2s;
  }
  .fab:hover { transform: scale(1.1); box-shadow: 0 8px 26px rgba(108,92,231,.55); }
  .fab.open { transform: rotate(45deg); }
  .fab-icon { line-height: 1; transition: transform .2s; }

  /* ── DAY PICKER POPUP ── */
  .day-picker {
    position: fixed;
    bottom: 96px;
    right: 24px;
    background: white;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
    z-index: 89;
    width: 260px;
    transform: scale(.85) translateY(20px);
    transform-origin: bottom right;
    opacity: 0;
    pointer-events: none;
    transition: transform .2s ease, opacity .2s ease;
  }
  .day-picker.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }
  .day-picker-title {
    font-size: .75rem;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 600;
    letter-spacing: .03em;
  }
  .day-picker-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .day-btn {
    padding: 10px 8px;
    border: none;
    border-radius: 10px;
    font-family: 'Prompt', sans-serif;
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    color: white;
    transition: transform .15s, filter .15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .day-btn:hover { transform: scale(1.04); filter: brightness(1.08); }
  .day-btn.dark-text { color: #333 !important; }

  /* ── CAPTURE HIDE CONTROLS ── */
  .no-print { }
  #capture .no-print { display: none !important; }

  /* ── SAVING OVERLAY ── */
  #saving-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: white;
    font-family: 'Prompt', sans-serif;
    font-size: 1rem;
    font-weight: 600;
  }
  #saving-overlay.show { display: flex; }
  .spinner {
    width: 36px; height: 36px;
    border: 4px solid rgba(255,255,255,.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- COLOR CUSTOMIZER -->
<div class="color-panel no-print">
  <h3>🎨 ปรับสีวัน</h3>
  <div class="color-swatch"><label>จันทร์</label><input type="color" id="c-mon" value="#FF6B6B" oninput="setColor('--mon',this.value)"></div>
  <div class="color-swatch"><label>อังคาร</label><input type="color" id="c-tue" value="#FF9F43" oninput="setColor('--tue',this.value)"></div>
  <div class="color-swatch"><label>พุธ</label><input type="color" id="c-wed" value="#FFEAA7" oninput="setColor('--wed',this.value)"></div>
  <div class="color-swatch"><label>พฤหัส</label><input type="color" id="c-thu" value="#55EFC4" oninput="setColor('--thu',this.value)"></div>
  <div class="color-swatch"><label>ศุกร์</label><input type="color" id="c-fri" value="#74B9FF" oninput="setColor('--fri',this.value)"></div>
  <div class="color-swatch"><label>เสาร์</label><input type="color" id="c-sat" value="#A29BFE" oninput="setColor('--sat',this.value)"></div>
  <div class="color-swatch"><label>อาทิตย์</label><input type="color" id="c-sun" value="#FD79A8" oninput="setColor('--sun',this.value)"></div>
  <div class="bg-pick">
    <label>พื้นหลัง</label>
    <input type="color" id="c-bg" value="#F8F9FF" oninput="setColor('--bg',this.value);document.getElementById('capture').style.background=this.value">
  </div>
</div>

<!-- SAVE TOOLBAR -->
<div class="toolbar no-print">
  <button class="btn-save" onclick="saveImage()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    บันทึกรูปตาราง
  </button>
</div>

<!-- CAPTURE ZONE -->
<div id="capture">
  <!-- TITLE -->
  <div class="title-wrap">
    <input id="page-title" type="text" value="ตารางกิจกรรมประจำสัปดาห์" placeholder="พิมพ์หัวข้อที่นี่…" />
    <div class="title-hint no-print">✏️ คลิกเพื่อแก้ไขหัวข้อ</div>
  </div>

  <!-- DESKTOP TABLE -->
  <div class="table-wrap">
    <table id="week-table">
      <thead>
        <tr>
          <th class="th-mon"><span class="th-day-name">จันทร์</span><span class="th-day-en">Monday</span></th>
          <th class="th-tue"><span class="th-day-name">อังคาร</span><span class="th-day-en">Tuesday</span></th>
          <th class="th-wed"><span class="th-day-name">พุธ</span><span class="th-day-en">Wednesday</span></th>
          <th class="th-thu"><span class="th-day-name">พฤหัสบดี</span><span class="th-day-en">Thursday</span></th>
          <th class="th-fri"><span class="th-day-name">ศุกร์</span><span class="th-day-en">Friday</span></th>
          <th class="th-sat"><span class="th-day-name">เสาร์</span><span class="th-day-en">Saturday</span></th>
          <th class="th-sun"><span class="th-day-name">อาทิตย์</span><span class="th-day-en">Sunday</span></th>
        </tr>
      </thead>
      <tbody>
        <tr id="main-row">
          <td><div class="cell-inner" id="cell-mon"><button class="btn-add no-print" onclick="openModal('mon')">＋ เพิ่มกิจกรรม</button><button class="btn-add-time no-print" onclick="openModalWithTime('mon')">⏰ ระบุเวลา</button></div></td>
          <td><div class="cell-inner" id="cell-tue"><button class="btn-add no-print" onclick="openModal('tue')">＋ เพิ่มกิจกรรม</button><button class="btn-add-time no-print" onclick="openModalWithTime('tue')">⏰ ระบุเวลา</button></div></td>
          <td><div class="cell-inner" id="cell-wed"><button class="btn-add no-print" onclick="openModal('wed')">＋ เพิ่มกิจกรรม</button><button class="btn-add-time no-print" onclick="openModalWithTime('wed')">⏰ ระบุเวลา</button></div></td>
          <td><div class="cell-inner" id="cell-thu"><button class="btn-add no-print" onclick="openModal('thu')">＋ เพิ่มกิจกรรม</button><button class="btn-add-time no-print" onclick="openModalWithTime('thu')">⏰ ระบุเวลา</button></div></td>
          <td><div class="cell-inner" id="cell-fri"><button class="btn-add no-print" onclick="openModal('fri')">＋ เพิ่มกิจกรรม</button><button class="btn-add-time no-print" onclick="openModalWithTime('fri')">⏰ ระบุเวลา</button></div></td>
          <td><div class="cell-inner" id="cell-sat"><button class="btn-add no-print" onclick="openModal('sat')">＋ เพิ่มกิจกรรม</button><button class="btn-add-time no-print" onclick="openModalWithTime('sat')">⏰ ระบุเวลา</button></div></td>
          <td><div class="cell-inner" id="cell-sun"><button class="btn-add no-print" onclick="openModal('sun')">＋ เพิ่มกิจกรรม</button><button class="btn-add-time no-print" onclick="openModalWithTime('sun')">⏰ ระบุเวลา</button></div></td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- MOBILE DAYS -->
  <div class="mobile-days" id="mobile-days">
    <!-- generated by JS -->
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="modal-overlay" onclick="closeIfOutside(event)">
  <div class="modal">
    <div class="modal-drag"></div>
    <h2 id="modal-title">เพิ่มกิจกรรม</h2>

    <label>ชื่อกิจกรรม *</label>
    <input id="act-name" type="text" placeholder="เช่น ประชุมทีม, ออกกำลังกาย…" />

    <span class="quick-time-label">⚡ เลือกช่วงเวลาด่วน</span>
    <div class="quick-chips">
      <button type="button" class="chip" onclick="setQuickTime('06:00','07:00')">🌅 เช้าตรู่</button>
      <button type="button" class="chip" onclick="setQuickTime('08:00','09:00')">☀️ เช้า</button>
      <button type="button" class="chip" onclick="setQuickTime('12:00','13:00')">🌤 เที่ยง</button>
      <button type="button" class="chip" onclick="setQuickTime('14:00','15:00')">🌇 บ่าย</button>
      <button type="button" class="chip" onclick="setQuickTime('18:00','19:00')">🌆 เย็น</button>
      <button type="button" class="chip" onclick="setQuickTime('20:00','21:00')">🌙 ค่ำ</button>
    </div>

    <label>เวลาเริ่ม – สิ้นสุด (หรือกำหนดเอง)</label>
    <div class="time-row">
      <input id="act-start" type="time" />
      <input id="act-end" type="time" />
    </div>

    <label>หมายเหตุ (ไม่บังคับ)</label>
    <textarea id="act-note" placeholder="รายละเอียดเพิ่มเติม…"></textarea>

    <label>สีการ์ด</label>
    <div class="color-row" id="color-row"></div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-confirm" onclick="addActivity()">บันทึก</button>
    </div>
  </div>
</div>

<!-- SAVING OVERLAY -->
<div id="saving-overlay">
  <div class="spinner"></div>
  <span>กำลังบันทึกรูป…</span>
</div>

<script>
const DAYS = [
  { key: 'mon', th: 'จันทร์',    en: 'Monday',    cssVar: '--mon', textDark: false },
  { key: 'tue', th: 'อังคาร',   en: 'Tuesday',   cssVar: '--tue', textDark: false },
  { key: 'wed', th: 'พุธ',       en: 'Wednesday', cssVar: '--wed', textDark: true  },
  { key: 'thu', th: 'พฤหัสบดี', en: 'Thursday',  cssVar: '--thu', textDark: true  },
  { key: 'fri', th: 'ศุกร์',    en: 'Friday',    cssVar: '--fri', textDark: false },
  { key: 'sat', th: 'เสาร์',    en: 'Saturday',  cssVar: '--sat', textDark: false },
  { key: 'sun', th: 'อาทิตย์',  en: 'Sunday',    cssVar: '--sun', textDark: false },
];

const DAY_COLORS = {
  mon: '#FF6B6B', tue: '#FF9F43', wed: '#FFEAA7',
  thu: '#55EFC4', fri: '#74B9FF', sat: '#A29BFE', sun: '#FD79A8'
};

const PALETTE = [
  '#FF6B6B','#FF9F43','#FFEAA7','#55EFC4','#74B9FF','#A29BFE','#FD79A8',
  '#00CEC9','#FDCB6E','#E17055','#81ECEC','#DFE6E9','#B8E994','#F8A5C2'
];

let currentDay = null;
let selectedColor = PALETTE[0];

/* ── Build palette dots ── */
const cr = document.getElementById('color-row');
PALETTE.forEach((c, i) => {
  const d = document.createElement('div');
  d.className = 'color-dot' + (i===0?' active':'');
  d.style.background = c;
  d.title = c;
  d.onclick = () => {
    selectedColor = c;
    cr.querySelectorAll('.color-dot').forEach(x => x.classList.remove('active'));
    d.classList.add('active');
  };
  cr.appendChild(d);
});

/* ── Build mobile day cards ── */
function buildMobileDays() {
  const container = document.getElementById('mobile-days');
  container.innerHTML = '';
  DAYS.forEach(day => {
    const wrapper = document.createElement('div');
    wrapper.className = 'mobile-day';
    wrapper.id = 'mday-' + day.key;

    const color = getComputedStyle(document.documentElement).getPropertyValue(day.cssVar).trim() || DAY_COLORS[day.key];
    const textColor = day.textDark ? '#333' : '#fff';

    wrapper.innerHTML = `
      <div class="mobile-day-header" style="background:${color}; color:${textColor}" onclick="toggleDay('${day.key}')">
        <div class="mobile-day-title">
          <div class="mobile-day-dot" style="background:rgba(0,0,0,.2)"></div>
          <div>
            <div class="mobile-day-name">${day.th}</div>
            <div class="mobile-day-en">${day.en}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="mobile-day-count" id="mcount-${day.key}">0 กิจกรรม</span>
          <span class="mobile-day-arrow">▼</span>
        </div>
      </div>
      <div class="mobile-day-body" id="mbody-${day.key}">
        <button class="btn-add no-print" style="margin-top:4px" onclick="openModal('${day.key}')">＋ เพิ่มกิจกรรม</button>
        <button class="btn-add-time no-print" onclick="openModalWithTime('${day.key}')">⏰ ระบุเวลา</button>
      </div>
    `;
    container.appendChild(wrapper);
  });
}

function toggleDay(key) {
  const el = document.getElementById('mday-' + key);
  el.classList.toggle('open');
}

function updateMobileCount(day) {
  const body = document.getElementById('mbody-' + day);
  if (!body) return;
  const count = body.querySelectorAll('.activity').length;
  const counter = document.getElementById('mcount-' + day);
  if (counter) counter.textContent = count + ' กิจกรรม';
}

/* ── Color helper ── */
function setColor(varName, val) {
  document.documentElement.style.setProperty(varName, val);
  // Rebuild mobile headers to reflect new colors
  buildMobileDays();
  // Reattach activities from desktop cells to mobile
  syncActivitiesToMobile();
}

function syncActivitiesToMobile() {
  DAYS.forEach(day => {
    const desktopCell = document.getElementById('cell-' + day.key);
    const mobileBody = document.getElementById('mbody-' + day.key);
    if (!desktopCell || !mobileBody) return;
    const acts = desktopCell.querySelectorAll('.activity');
    // Remove existing from mobile, re-add
    mobileBody.querySelectorAll('.activity').forEach(a => a.remove());
    const addBtn = mobileBody.querySelector('.btn-add');
    acts.forEach(act => {
      const clone = act.cloneNode(true);
      clone.querySelector('.act-delete').onclick = function() {
        // delete from both
        const id = act.dataset.actid;
        document.querySelectorAll('[data-actid="'+id+'"]').forEach(el => el.remove());
        updateMobileCount(day.key);
      };
      mobileBody.insertBefore(clone, addBtn);
    });
    updateMobileCount(day.key);
  });
}

/* ── Modal ── */
function openModal(day) {
  currentDay = day;
  const dayNames = {mon:'จันทร์',tue:'อังคาร',wed:'พุธ',thu:'พฤหัสบดี',fri:'ศุกร์',sat:'เสาร์',sun:'อาทิตย์'};
  document.getElementById('modal-title').textContent = `เพิ่มกิจกรรม — วัน${dayNames[day]}`;
  document.getElementById('act-name').value = '';
  document.getElementById('act-start').value = '';
  document.getElementById('act-end').value = '';
  document.getElementById('act-note').value = '';
  document.querySelectorAll('.chip').forEach(c => { c.style.background=''; c.style.borderColor=''; c.style.fontWeight=''; });
  selectedColor = DAY_COLORS[day];
  cr.querySelectorAll('.color-dot').forEach(d => {
    d.classList.toggle('active', d.title === selectedColor);
  });
  // Open the mobile day accordion
  const mday = document.getElementById('mday-' + day);
  if (mday && !mday.classList.contains('open')) mday.classList.add('open');
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(() => document.getElementById('act-name').focus(), 150);
}

function openModalWithTime(day) {
  openModal(day);
  // Focus the start time field after modal opens
  setTimeout(() => document.getElementById('act-start').focus(), 200);
}

function setQuickTime(start, end) {
  document.getElementById('act-start').value = start;
  document.getElementById('act-end').value = end;
  // Highlight the active chip
  document.querySelectorAll('.chip').forEach(c => {
    c.style.background = '';
    c.style.borderColor = '';
    c.style.fontWeight = '';
  });
  event.target.style.background = '#d8d8ff';
  event.target.style.borderColor = '#6c5ce7';
  event.target.style.fontWeight = '700';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  currentDay = null;
}

function closeIfOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function fmt12(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  const suffix = h >= 12 ? 'น.' : '';
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,'0')}${suffix}`;
}

let actIdCounter = 0;

function createActivityCard(name, start, end, note, color, day) {
  const id = 'act-' + (++actIdCounter);
  let timeStr = '';
  if (start && end) timeStr = `${fmt12(start)} – ${fmt12(end)}`;
  else if (start) timeStr = fmt12(start);

  const card = document.createElement('div');
  card.className = 'activity';
  card.dataset.actid = id;
  card.style.background = color + '33';
  card.style.borderLeft = `3px solid ${color}`;
  card.style.color = '#2d3436';

  card.innerHTML = `
    ${timeStr ? `<span class="time-badge" style="color:${color}">${timeStr}</span>` : ''}
    <span class="act-name">${escHtml(name)}</span>
    ${note ? `<span class="act-note">${escHtml(note)}</span>` : ''}
    <button class="act-delete no-print" title="ลบ" onclick="deleteActivity('${id}','${day}')">✕</button>
  `;
  return { card, id };
}

function deleteActivity(id, day) {
  document.querySelectorAll('[data-actid="'+id+'"]').forEach(el => el.remove());
  updateMobileCount(day);
}

function addActivity() {
  const name = document.getElementById('act-name').value.trim();
  if (!name) { document.getElementById('act-name').focus(); return; }
  const start = document.getElementById('act-start').value;
  const end = document.getElementById('act-end').value;
  const note = document.getElementById('act-note').value.trim();
  const day = currentDay;

  const { card, id } = createActivityCard(name, start, end, note, selectedColor, day);

  // Add to desktop cell
  const desktopCell = document.getElementById('cell-' + day);
  const desktopAddBtn = desktopCell.querySelector('.btn-add');
  const desktopCard = card.cloneNode(true);
  desktopCard.dataset.actid = id;
  desktopCard.querySelector('.act-delete').onclick = () => deleteActivity(id, day);
  desktopCell.insertBefore(desktopCard, desktopAddBtn);

  // Add to mobile body
  const mobileBody = document.getElementById('mbody-' + day);
  if (mobileBody) {
    const mobileAddBtn = mobileBody.querySelector('.btn-add');
    const mobileCard = card.cloneNode(true);
    mobileCard.dataset.actid = id;
    mobileCard.querySelector('.act-delete').onclick = () => deleteActivity(id, day);
    mobileBody.insertBefore(mobileCard, mobileAddBtn);
    updateMobileCount(day);
  }

  closeModal();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Save Image ── */
function saveImage() {
  const savingEl = document.getElementById('saving-overlay');
  savingEl.classList.add('show');

  // Get title text from input
  const titleInput = document.getElementById('page-title');
  const titleText = titleInput.value || titleInput.placeholder || 'ตารางกิจกรรมประจำสัปดาห์';

  // Build a standalone render element (desktop-style, fixed width)
  const RENDER_WIDTH = 1200;
  const renderEl = document.createElement('div');
  renderEl.style.cssText = `
    position: fixed;
    left: -9999px;
    top: 0;
    width: ${RENDER_WIDTH}px;
    background: ${getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#F8F9FF'};
    padding: 32px 28px 36px;
    font-family: 'Prompt', sans-serif;
    box-sizing: border-box;
  `;

  // Title as div (so Thai vowels render correctly)
  const titleDiv = document.createElement('div');
  titleDiv.style.cssText = `
    text-align: center;
    font-size: 2rem;
    font-weight: 700;
    color: #2d3436;
    margin-bottom: 28px;
    font-family: 'Prompt', sans-serif;
    letter-spacing: .01em;
    line-height: 1.6;
  `;
  titleDiv.textContent = titleText;
  renderEl.appendChild(titleDiv);

  // Table
  const tableWrap = document.createElement('div');
  tableWrap.style.cssText = 'width:100%;overflow:hidden;';

  const tbl = document.createElement('table');
  tbl.style.cssText = 'width:100%;border-collapse:separate;border-spacing:8px;table-layout:fixed;';

  // Header
  const thead = document.createElement('thead');
  const headerRow = document.createElement('tr');
  const dayDefs = [
    { th:'จันทร์', en:'Monday',    cssVar:'--mon', dark:false },
    { th:'อังคาร', en:'Tuesday',   cssVar:'--tue', dark:false },
    { th:'พุธ',     en:'Wednesday', cssVar:'--wed', dark:true  },
    { th:'พฤหัสบดี',en:'Thursday', cssVar:'--thu', dark:true  },
    { th:'ศุกร์',  en:'Friday',    cssVar:'--fri', dark:false },
    { th:'เสาร์',  en:'Saturday',  cssVar:'--sat', dark:false },
    { th:'อาทิตย์',en:'Sunday',    cssVar:'--sun', dark:false },
  ];
  const dayKeys = ['mon','tue','wed','thu','fri','sat','sun'];

  dayDefs.forEach((d, i) => {
    const th = document.createElement('th');
    const color = getComputedStyle(document.documentElement).getPropertyValue(d.cssVar).trim() || DAY_COLORS[dayKeys[i]];
    th.style.cssText = `
      background:${color};
      color:${d.dark ? '#333' : '#fff'};
      padding:12px 8px 14px;
      font-size:.9rem;
      font-weight:700;
      border-radius:10px;
      text-align:center;
      font-family:'Prompt',sans-serif;
      line-height:1.5;
    `;
    th.innerHTML = `<span style="font-size:1.1rem;display:block;line-height:1.6;">${d.th}</span><span style="font-size:.68rem;opacity:.8;font-weight:400;">${d.en}</span>`;
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);
  tbl.appendChild(thead);

  // Body
  const tbody = document.createElement('tbody');
  const bodyRow = document.createElement('tr');
  dayKeys.forEach(key => {
    const td = document.createElement('td');
    td.style.cssText = 'vertical-align:top;padding:6px;';

    const inner = document.createElement('div');
    inner.style.cssText = `
      background:#fff;
      border-radius:12px;
      padding:8px;
      min-height:160px;
      box-shadow:0 2px 8px rgba(0,0,0,.06);
      display:flex;
      flex-direction:column;
      gap:6px;
    `;

    // Copy activities from desktop cell
    const srcCell = document.getElementById('cell-' + key);
    const acts = srcCell.querySelectorAll('.activity');
    acts.forEach(act => {
      const clone = act.cloneNode(true);
      // Remove delete button from clone
      const del = clone.querySelector('.act-delete');
      if (del) del.remove();
      clone.style.cssText = act.style.cssText;
      inner.appendChild(clone);
    });

    td.appendChild(inner);
    bodyRow.appendChild(td);
  });
  tbody.appendChild(bodyRow);
  tbl.appendChild(tbody);
  tableWrap.appendChild(tbl);
  renderEl.appendChild(tableWrap);
  document.body.appendChild(renderEl);

  setTimeout(() => {
    html2canvas(renderEl, {
      scale: 2,
      useCORS: true,
      width: RENDER_WIDTH,
      windowWidth: RENDER_WIDTH,
      scrollX: 0,
      scrollY: 0,
      backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#F8F9FF',
      logging: false,
    }).then(canvas => {
      document.body.removeChild(renderEl);
      savingEl.classList.remove('show');
      const now = new Date();
      const pad = n => String(n).padStart(2,'0');
      const name = `ตาราง_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}.png`;
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = name;
      a.click();
    }).catch(err => {
      document.body.removeChild(renderEl);
      savingEl.classList.remove('show');
      console.error(err);
      alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
    });
  }, 300);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('show') && e.target.tagName !== 'TEXTAREA') addActivity();
});

// Init mobile UI
buildMobileDays();


/* ── Floating Action Button ── */
function buildDayPicker() {
  const grid = document.getElementById('day-picker-grid');
  grid.innerHTML = '';
  DAYS.forEach(day => {
    const color = getComputedStyle(document.documentElement).getPropertyValue(day.cssVar).trim() || DAY_COLORS[day.key];
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (day.textDark ? ' dark-text' : '');
    btn.style.background = color;
    btn.innerHTML = `<span>${day.th}</span>`;
    btn.onclick = () => {
      closeDayPicker();
      openModal(day.key);
    };
    grid.appendChild(btn);
  });
}

function toggleDayPicker() {
  const picker = document.getElementById('day-picker');
  const fab = document.getElementById('fab-btn');
  const isOpen = picker.classList.contains('open');
  if (isOpen) {
    closeDayPicker();
  } else {
    buildDayPicker();
    picker.classList.add('open');
    fab.classList.add('open');
  }
}

function closeDayPicker() {
  document.getElementById('day-picker').classList.remove('open');
  document.getElementById('fab-btn').classList.remove('open');
}

// Close day picker when clicking outside
document.addEventListener('click', e => {
  const picker = document.getElementById('day-picker');
  const fab = document.getElementById('fab-btn');
  if (!picker.contains(e.target) && e.target !== fab && !fab.contains(e.target)) {
    closeDayPicker();
  }
});

</script>

<!-- FLOATING ADD BUTTON -->
<button class="fab no-print" id="fab-btn" onclick="toggleDayPicker()" title="เพิ่มกิจกรรม">
  <span class="fab-icon" id="fab-icon">＋</span>
</button>

<!-- DAY PICKER POPUP -->
<div class="day-picker no-print" id="day-picker">
  <div class="day-picker-title">เลือกวันที่ต้องการเพิ่มกิจกรรม</div>
  <div class="day-picker-grid" id="day-picker-grid"></div>
</div>
</body>
</html>
